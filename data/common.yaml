---
# Default configuration for Pabawi module
# These values can be overridden in environment-specific or node-specific Hiera data
#
# All paths default to /opt/pabawi/<component> for both npm and Docker installs.
# Users only need to specify *_source parameters in Hiera to tell Puppet where
# to fetch git repos, certificates, or other files from.

# Proxy management
pabawi::proxy_manage: true
pabawi::proxy_class: 'pabawi::proxy::nginx'

# Installation management
pabawi::install_manage: true
pabawi::install_class: 'pabawi::install::npm'

# Integration configuration
# Simple array of enabled integrations - configuration via class parameters below
pabawi::integrations: []

# For a full Puppet setup
#pabawi::integrations:
#  - bolt
#  - hiera
#  - puppetdb
#  - puppetserver
#  - ssh
#  - proxmox
#  - aws

# Integration Control:
# 1. Array inclusion: Integration class is included (resources created, .env fragment added)
# 2. enabled parameter: Controls whether integration is active (sets *_ENABLED in .env)
#
# This allows pre-configuration without enabling, and easy toggling via enabled parameter

# Bolt integration configuration
# pabawi::integrations::bolt::enabled: true
# pabawi::integrations::bolt::settings:
#   project_path: '/opt/pabawi/bolt-project'       # default, override if needed
#   execution_timeout: 300000
# pabawi::integrations::bolt::project_path_source: 'https://github.com/example/bolt-project.git'
# pabawi::integrations::bolt::manage_package: false

# PuppetDB integration configuration
# pabawi::integrations::puppetdb::enabled: true
# pabawi::integrations::puppetdb::settings:
#   server_url: 'https://puppetdb.example.com'
#   port: 8081
#   ssl_enabled: true
#   ssl_ca: '/opt/pabawi/certs/puppetdb/ca.pem'       # default, override if needed
#   ssl_cert: '/opt/pabawi/certs/puppetdb/cert.pem'    # default, override if needed
#   ssl_key: '/opt/pabawi/certs/puppetdb/key.pem'      # default, override if needed
#   ssl_reject_unauthorized: true
# pabawi::integrations::puppetdb::ssl_ca_source: 'file:///etc/puppetlabs/puppet/ssl/certs/ca.pem'
# pabawi::integrations::puppetdb::ssl_cert_source: 'file:///etc/puppetlabs/puppet/ssl/certs/agent.pem'
# pabawi::integrations::puppetdb::ssl_key_source: 'file:///etc/puppetlabs/puppet/ssl/private_keys/agent.pem'

# Puppet Server integration configuration
# pabawi::integrations::puppetserver::enabled: true
# pabawi::integrations::puppetserver::settings:
#   server_url: 'https://puppet.example.com'
#   port: 8140
#   ssl_enabled: true
#   ssl_ca: '/opt/pabawi/certs/puppetserver/ca.pem'       # default, override if needed
#   ssl_cert: '/opt/pabawi/certs/puppetserver/cert.pem'    # default, override if needed
#   ssl_key: '/opt/pabawi/certs/puppetserver/key.pem'      # default, override if needed
#   ssl_reject_unauthorized: true
#   inactivity_threshold: 3600
#   cache_ttl: 300000
#   circuit_breaker_threshold: 5
#   circuit_breaker_timeout: 60000
#   circuit_breaker_reset_timeout: 30000
# pabawi::integrations::puppetserver::ssl_ca_source: 'file:///etc/puppetlabs/puppet/ssl/certs/ca.pem'
# pabawi::integrations::puppetserver::ssl_cert_source: 'file:///etc/puppetlabs/puppet/ssl/certs/agent.pem'
# pabawi::integrations::puppetserver::ssl_key_source: 'file:///etc/puppetlabs/puppet/ssl/private_keys/agent.pem'

# Hiera integration configuration
# pabawi::integrations::hiera::enabled: true
# pabawi::integrations::hiera::settings:
#   control_repo_path: '/opt/pabawi/control-repo'    # default, override if needed
#   config_path: 'hiera_pabawi.yaml'
#   environments: ['production']
#   fact_source_prefer_puppetdb: true
#   fact_source_local_path: '/opt/pabawi/facts'
# pabawi::integrations::hiera::control_repo_source: 'https://github.com/example/control-repo.git'
# pabawi::integrations::hiera::manage_package: false

# Ansible integration configuration
# pabawi::integrations::ansible::enabled: true
# pabawi::integrations::ansible::settings:
#   inventory_path: '/opt/pabawi/ansible/inventory'    # default, override if needed
#   playbook_path: '/opt/pabawi/ansible/playbooks'     # default, override if needed
#   execution_timeout: 300000
#   config: '/opt/pabawi/ansible/ansible.cfg'
# pabawi::integrations::ansible::inventory_source: 'https://github.com/example/ansible-inventory.git'
# pabawi::integrations::ansible::playbook_source: 'https://github.com/example/ansible-playbooks.git'
# pabawi::integrations::ansible::manage_package: false

# SSH integration configuration
# pabawi::integrations::ssh::enabled: true
# pabawi::integrations::ssh::settings:
#   config_path: '/opt/pabawi/ssh/config'
#   default_user: 'root'
#   default_port: 22
#   default_key: '/opt/pabawi/ssh/id_rsa'

# Proxmox integration configuration
# pabawi::integrations::proxmox::enabled: true
# pabawi::integrations::proxmox::settings:
#   host: 'proxmox.example.com'
#   port: 8006
#   token: 'user@pam!tokenid=token-value'
#   ssl_reject_unauthorized: true
#   ssl_ca: '/opt/pabawi/certs/proxmox/ca.pem'       # default, override if needed
#   ssl_cert: '/opt/pabawi/certs/proxmox/cert.pem'    # default, override if needed
#   ssl_key: '/opt/pabawi/certs/proxmox/key.pem'      # default, override if needed
#   timeout: 30000
#   priority: 7
# pabawi::integrations::proxmox::ssl_ca_source: 'file:///etc/ssl/certs/proxmox-ca.pem'
# pabawi::integrations::proxmox::ssl_cert_source: 'file:///etc/ssl/certs/proxmox-cert.pem'
# pabawi::integrations::proxmox::ssl_key_source: 'file:///etc/ssl/private/proxmox-key.pem'

# AWS integration configuration
# pabawi::integrations::aws::enabled: true
# pabawi::integrations::aws::settings:
#   profile: 'pabawi-prod'
#   default_region: 'us-east-1'
#   regions:
#     - 'us-east-1'
#     - 'eu-west-1'
# Or with explicit credentials:
# pabawi::integrations::aws::settings:
#   access_key_id: 'AKIAIOSFODNN7EXAMPLE'
#   secret_access_key: 'wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY'
#   default_region: 'us-east-1'

# Nginx proxy configuration
pabawi::proxy::nginx::ssl_enable: true
pabawi::proxy::nginx::ssl_self_signed: true
pabawi::proxy::nginx::listen_port: 443
pabawi::proxy::nginx::backend_port: 3000

# NPM installation configuration
pabawi::install::npm::install_dir: '/opt/pabawi/app'
pabawi::install::npm::repo_url: 'https://github.com/example42/pabawi.git'
pabawi::install::npm::version: 'main'
pabawi::install::npm::user: 'pabawi'
pabawi::install::npm::group: 'pabawi'
pabawi::install::npm::log_level: 'info'
pabawi::install::npm::auth_enabled: false
# pabawi::install::npm::jwt_secret: 'your-secret-key-here'
pabawi::install::npm::database_path: '/opt/pabawi/data/pabawi.db'
pabawi::install::npm::concurrent_execution_limit: 5

# Docker installation configuration
pabawi::install::docker::image: 'example42/pabawi:latest'
pabawi::install::docker::container_name: 'pabawi'
pabawi::install::docker::auto_restart: true
pabawi::install::docker::install_dir: '/opt/pabawi'
pabawi::install::docker::log_level: 'info'
pabawi::install::docker::auth_enabled: false
# pabawi::install::docker::jwt_secret: 'your-secret-key-here'
pabawi::install::docker::database_path: '/opt/pabawi/data/pabawi.db'
pabawi::install::docker::concurrent_execution_limit: 5
pabawi::install::docker::ports:
  '3000': '3000'
